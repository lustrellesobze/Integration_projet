input {
  beats {
    port => 5044
  }
  udp {
    port => 5000
    codec => json
  }
}

filter {
  # Analyse des logs Laravel pour extraire le niveau (ERROR, INFO, etc.)
  if [type] == "laravel" {
    grok {
      match => {
        "message" => "\[%{TIMESTAMP_ISO8601:timestamp}\] %{DATA:environment}\.%{LOGLEVEL:level}: %{GREEDYDATA:message}"
      }
      overwrite => ["message"]
    }
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }
}

output {
  # 1. Envoi vers Elasticsearch pour ta visualisation Kibana
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "logstash-%{+YYYY.MM.dd}"
  }

  # 2. ALERTE EMAIL EN CAS D'ERREUR (Niveau ERROR ou CRITICAL)
  if [level] == "ERROR" or [level] == "CRITICAL" {
    email {
      to => "slustrelle75@gmail.com"
      from => "slustrelle75@gmail.com"
      subject => "ALERTE : Erreur critique sur l'application Laravel"
      body => "Une erreur a été détectée dans les logs de l'application.\n\nEnvironnement: %{environment}\nNiveau: %{level}\nMessage: %{message}\nDate: %{timestamp}"
      address => "smtp.gmail.com"
      port => 587
      use_tls => true
      username => "slustrelle75@gmail.com"
      
      # Ton mot de passe d'application Google (16 caractères sans espaces)
      password => "zafqfyaxrlzyrejo"
    }
  }

  # 3. Affichage dans les logs Docker (Utile pour le débuggage)
  stdout {
    codec => rubydebug
  }
}