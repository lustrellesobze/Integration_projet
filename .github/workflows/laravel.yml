name: Laravel CI & Docker

on:
  push:
    branches: [ "initialize", "master", "develop" ]
  pull_request:
    branches: [ "initialize", "master", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PHP_VERSION: '8.2'
  IMAGE_NAME: project-api

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Tests Laravel + Linting + Sécurité
  # ─────────────────────────────────────────────
  laravel-ci:
    name: 🧪 CI Laravel & Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Copy .env
        working-directory: ./Backend
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies
        working-directory: ./Backend
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: PHP Pint - Linting
        working-directory: ./Backend
        run: vendor/bin/pint --test

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Security Check Dependencies
        working-directory: ./Backend
        run: composer audit || true

      - name: Generate key
        working-directory: ./Backend
        run: php artisan key:generate

      - name: Directory Permissions
        working-directory: ./Backend
        run: chmod -R 777 storage bootstrap/cache

      - name: Execute tests (PHPUnit)
        working-directory: ./Backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --parallel

  # ─────────────────────────────────────────────
  # JOB 2 : Build + Push DockerHub + Scan Trivy
  # ─────────────────────────────────────────────
  build-docker:
    name: 🐳 Build, Scan & Push Docker Image
    runs-on: ubuntu-latest
    needs: laravel-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            --target production \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            ./Backend

      - name: Verify container starts
        run: |
          docker run -d --name test-container \
            -e APP_KEY=base64:dGVzdGtleWZvcmNpY2Rwd== \
            -e APP_ENV=production \
            -e DB_HOST=localhost \
            -e DB_DATABASE=project_db \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=root \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          docker ps -a
          docker stop test-container
          docker rm test-container

      - name: Trivy Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Push to DockerHub
        if: github.ref == 'refs/heads/master'
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────────
  # JOB 3 : Scan de sécurité du code source
  # ─────────────────────────────────────────────
  security:
    name: 🔒 Code Security Scan
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, zip, pdo_mysql
          coverage: none

      - name: Composer Audit
        working-directory: ./Backend
        run: |
          composer install --no-interaction --prefer-dist --no-dev
          composer audit || true

      # ✅ Fix TruffleHog : s'exécute uniquement sur pull_request
      # Sur un push direct BASE et HEAD peuvent être identiques → erreur garantie
      - name: TruffleHog Secret Detection
        if: github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: ${{ github.event.pull_request.head.sha }}
          extra_args: --only-verified
        continue-on-error: true