name: Laravel CI & Docker

on:
  push:
    branches: [ "initialize", "master", "develop" ]
  pull_request:
    branches: [ "initialize", "master", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PHP_VERSION: '8.2'
  IMAGE_NAME: project-api

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 : Tests Laravel + Linting + Sécurité
  # ─────────────────────────────────────────────
  laravel-ci:
    name: 🧪 CI Laravel & Tests
    runs-on: ubuntu-latest

    services: 
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      - name: Checkout code // 
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP // 
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Copy .env
        working-directory: ./Backend
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies //
        working-directory: ./Backend
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: PHP Pint - Linting  // 
        working-directory: ./Backend
        run: vendor/bin/pint --test

      - name: Secret Scanning (Gitleaks) //
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Security Check Dependencies
        working-directory: ./Backend
        run: composer audit || true // Vérifie si les bibliothèques ont des failles de sécurité connues.

      - name: Generate key
        working-directory: ./Backend
        run: php artisan key:generate

      - name: Directory Permissions
        working-directory: ./Backend
        run: chmod -R 777 storage bootstrap/cache

      - name: Execute tests (PHPUnit) //
        working-directory: ./Backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test --parallel

  # ─────────────────────────────────────────────
  # JOB 2 : Build + Push DockerHub + Scan Trivy
  # ─────────────────────────────────────────────
  build-docker:
    name: 🐳 Build, Scan & Push Docker Image // 
    runs-on: ubuntu-latest
    needs: laravel-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image // 
        run: |
          docker build \
            --target production \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            ./Backend

      - name: Verify container starts // Le pipeline lance mon conteneur et vérfie si docker a un probleme de configuration interne
        run: |
          docker run -d --name test-container \
            -e APP_KEY=base64:dGVzdGtleWZvcmNpY2Rwd== \
            -e APP_ENV=production \
            -e DB_HOST=localhost \
            -e DB_DATABASE=project_db \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=root \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          sleep 5
          docker ps -a
          docker stop test-container
          docker rm test-container

      - name: Trivy Scan Docker Image // l'analyse des vulnerabilité critique
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      # ✅ Push sur toutes les branches du workflow (plus seulement master)
      - name: Push to DockerHub // l'image est envoyée sur le cloud Docker Hub pour être prête au déploiement.
        if: |
          github.event_name == 'push' &&
          (
            github.ref == 'refs/heads/master' ||
            github.ref == 'refs/heads/initialize' ||
            github.ref == 'refs/heads/develop'
          )
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

  # ─────────────────────────────────────────────
  # JOB 3 : Scan de sécurité du code source
  # ─────────────────────────────────────────────
  security:
    name: 🔒 Code Security Scan
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, zip, pdo_mysql
          coverage: none

      - name: Composer Audit
        working-directory: ./Backend
        run: |
          composer install --no-interaction --prefer-dist --no-dev
          composer audit || true

      # ✅ TruffleHog : push ET pull_request, avec base adaptée selon l'événement
      - name: TruffleHog Secret Detection // outil de Sécurité qui fouille l'historique complet de mon dépôt
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified
        continue-on-error: true
   # ─────────────────────────────────────────────
  # JOB 4 : SonarCloud Security Scan
  # ─────────────────────────────────────────────
  sonarcloud:
    name: 🔍 SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: laravel-ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, pdo_mysql
          coverage: xdebug

      - name: Install Dependencies
        working-directory: ./Backend
        run: composer install --no-interaction --prefer-dist

      # ✅ Copie du .env AVANT key:generate
      - name: Copy .env
        working-directory: ./Backend
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate coverage report
        working-directory: ./Backend
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ":memory:"
        run: |
          php artisan key:generate
          vendor/bin/phpunit --coverage-clover=coverage.xml || true

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          projectBaseDir: ./Backend

# ─────────────────────────────────────────────
  # BONUS 1 : DevSecOps — SonarCloud & OWASP
  # ─────────────────────────────────────────────
  devsecops:
    name: 🛡️ DevSecOps — OWASP Dependency Check
    runs-on: ubuntu-latest
    needs: security

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, zip, pdo_mysql
          coverage: none

      - name: Install Dependencies
        working-directory: ./Backend
        run: composer install --no-interaction --prefer-dist --no-dev

      - name: OWASP Dependency Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'Integration_projet'
          path: './Backend'
          format: 'HTML'
          out: 'reports'
          args: >
            --enableRetired
            --disableYarnAudit
        continue-on-error: true

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v4
        with:
          name: owasp-report
          path: reports/
          retention-days: 7
          # ─────────────────────────────────────────────
  # BONUS 2 : Multi-environnement dev/staging/prod
  # ─────────────────────────────────────────────
  deploy-staging:
    name: 🚀 Deploy — Staging
    runs-on: ubuntu-latest
    needs: devsecops
    if: github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image as staging
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:staging
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:staging

      - name: Notify staging deployed
        run: |
          echo "✅ Image staging déployée"
          echo "🔗 Commit : ${{ github.sha }}"
          echo "🌿 Branche : develop"

  deploy-production:
    name: 🚀 Deploy — Production
    runs-on: ubuntu-latest
    needs: devsecops
    if: github.ref == 'refs/heads/master'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Tag image as production
        run: |
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:production
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:production

      - name: Notify production deployed
        run: |
          echo "✅ Image production déployée"
          echo "🔗 Commit : ${{ github.sha }}"
          echo "🌿 Branche : master"

  # ─────────────────────────────────────────────
  # BONUS 3 : Dashboard KPI — Rapport pipeline
  # ─────────────────────────────────────────────
  kpi-report:
    name: 📊 KPI — Pipeline Report
    runs-on: ubuntu-latest
    needs: [laravel-ci, build-docker, security, devsecops]
    if: always()

    steps:
      - name: Generate KPI Report
        run: |
          echo "=================================================="
          echo "       RAPPORT KPI — PIPELINE CI/CD"
          echo "=================================================="
          echo "📅 Date         : $(date '+%Y-%m-%d %H:%M:%S')"
          echo "🌿 Branche      : ${{ github.ref_name }}"
          echo "🔗 Commit SHA   : ${{ github.sha }}"
          echo "👤 Auteur       : ${{ github.actor }}"
          echo "📦 Repository   : ${{ github.repository }}"
          echo "--------------------------------------------------"
          echo "📊 STATUTS DES JOBS"
          echo "--------------------------------------------------"
          echo "🧪 CI Laravel   : ${{ needs.laravel-ci.result }}"
          echo "🐳 Docker Build : ${{ needs.build-docker.result }}"
          echo "🔒 Security     : ${{ needs.security.result }}"
          echo "🛡️  DevSecOps    : ${{ needs.devsecops.result }}"
          echo "--------------------------------------------------"
          echo "🖼️  Image Docker : ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "=================================================="