name: Laravel CI & Docker

on:
  push:
    branches: [ "initialize", "master", "develop" ]
  pull_request:
    branches: [ "initialize", "master", "develop" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PHP_VERSION: 8.2

jobs:
  laravel-ci:
    name: 🧪 CI Laravel & Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.2
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_mysql
          coverage: none

      - name: Copy .env
        working-directory: ./Backend
        run: php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Install Dependencies
        working-directory: ./Backend
        run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: PHP Pint - Clean Code
        working-directory: ./Backend
        run: vendor/bin/pint

      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Security Check Dependencies (Composer Audit)
        working-directory: ./Backend
        run: composer audit || true

      - name: Generate key
        working-directory: ./Backend
        run: php artisan key:generate

      - name: Directory Permissions
        working-directory: ./Backend
        run: chmod -R 777 storage bootstrap/cache

      - name: Execute tests
        working-directory: ./Backend
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: root
        run: php artisan test

  build-docker:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: laravel-ci
    outputs:
      image-tag: project-api:${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image
        uses: docker/build-push-action@v5
        id: docker_build
        with:
          context: ./Backend
          dockerfile: ./Backend/Dockerfile
          push: false
          tags: project-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify container runs
        run: |
          docker run -d --name test-container \
            -e DB_HOST=localhost \
            -e DB_DATABASE=project_db \
            -e DB_USERNAME=root \
            -e DB_PASSWORD=root \
            project-api:${{ github.sha }} || true
          sleep 5
          docker ps -a
          docker stop test-container || true
          docker rm test-container || true

  security:
    name: 🔒 Security Scan Docker & Code
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP ${{ env.PHP_VERSION }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, zip, pdo_mysql
          coverage: none

      - name: Composer Audit
        working-directory: ./Backend
        run: |
          composer install --no-interaction --prefer-dist --optimize-autoloader --no-dev
          composer audit --no-dev || true

      - name: Trivy Scan Docker Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: project-api:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH

      - name: TruffleHog Secret Detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./ 
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true